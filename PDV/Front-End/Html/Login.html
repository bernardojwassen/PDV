<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PDV Web</title>

    <link rel="stylesheet" href="../Style/Login.css">
</head>
<body>

    <main class="container">

        <header class="navbar">
            <a href="Inicial.html" class="logo">PDV WEB</a>

            <a href="Inicial.html" class="voltar">
                VOLTAR
            </a>
        </header>

        <section class="login-section">

            <h1>ACESSO AO SISTEMA</h1>

            <form action="/login" method="POST" class="login-form">

                <div class="campo">
                    <label for="email">E-MAIL:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="senha">SENHA:</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">
                    ENTRAR NO PAINEL
                </button>

            </form>

            <p class="cadastro">
                Ainda não tem conta?
                <a href="Criar.html">CRIAR CONTA</a>
            </p>

        </section>

    </main>

    <script src="../JavaScript/Login.js"></script>

</body>
</html>
