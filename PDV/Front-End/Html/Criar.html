<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - PDV Web</title>

    <link rel="stylesheet" href="../Style/Criar.css">
</head>
<body>

    <main class="container">

        <header class="navbar">
            <a href="Inicial.html" class="logo">PDV WEB</a>

            <a href="Inicial.html" class="voltar">
                VOLTAR
            </a>
        </header>

        <section class="cadastro-section">

            <h1>CADASTRO DE NOVO USUÁRIO</h1>

            <form class="cadastro-form">

                <div class="campo">
                    <label for="nome">NOME COMPLETO:</label>
                    <input
                        type="text"
                        id="nome"
                        name="nome"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="comercio">NOME DO COMÉRCIO:</label>
                    <input
                        type="text"
                        id="comercio"
                        name="comercio"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="email">E-MAIL:</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="senha">SENHA:</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="confirmar">CONFIRMAR SENHA:</label>
                    <input
                        type="password"
                        id="confirmar"
                        name="confirmar"
                        required
                    >
                </div>

                <button type="submit" class="btn-cadastro">
                    FINALIZAR CADASTRO
                </button>

            </form> <p class="login-link">
                Já possui uma conta?
                <a href="Login.html">LOGIN</a>
            </p>

        </section>

    </main>

    <script src="../JavaScript/Criar.js"></script>
</body>
</html>
